<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>Login-bank</title>
</head>
<body>
    <h3 id="logo"><a href="/">Neo Bank</a></h3>
    {% with messages = get_flashed_messages(with_categories =true)%}
    {% if messages%}
    {% for category, message in messages%}
    <h5 id="{{ category }}">{{message}}</h5>
    {%endfor%}
    {%endif%}
    {%endwith%}
    
    <div class="main-content">
        <h3>Login!</h3>
        <form method="POST" class="account-form">
            <input required type="email" name="email" placeholder="Email">
            <input required type="password" name="pass" placeholder="Password">
            <input type="submit" value="Login" class="primary-btn">
        </form>
        <button onclick="location.href='/'" class="secondary-btn">Back</button>
    </div>
</body>
</html>
